[pytest]
# Pytest configuration for DeepFace model server tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# Test paths
testpaths = tests

# Markers for categorizing tests
markers =
    import: Tests for module imports
    model: Tests for model initialization
    detection: Tests for face detection
    config: Tests for configuration
    slow: Tests that take longer to run

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if using pytest-cov)
# addopts = --cov=app --cov-report=html --cov-report=term
